<div class="popup _fixed" id="callback">
    <div class="popup-content">
        <div class="popup-top">
            <h4>Получите бесплатную
                консультацию</h4>
            <button class="popup-close">
                <svg width="38" height="38" viewBox="0 0 38 38">
                    <use xlink:href='img/svg/icons.svg#close' />
                </svg>
            </button>
        </div>

        <div class="grid grid-2">
            <a href="" class="_btn _btn-white" target="_blank">
                <span>Написать <br>
                    в Whatsapp</span>
                <svg width="16" height="16" viewBox="0 0 16 16">
                    <use xlink:href='img/svg/icons.svg#wa' />
                </svg>
            </a>
            <a href="" class="_btn _btn-white" target="_blank">
                <span>Написать
                    <br> в Telegram</span>
                <svg width="16" height="16" viewBox="0 0 16 16">
                    <use xlink:href='img/svg/icons.svg#tg-widget' />
                </svg>
            </a>
            <a href="" class="_btn _btn-white" target="_blank">
                <span>Позвонить</span>
                <label>+ 7 955 281 6048</label>
            </a>
        </div>
    </div>
</div>

<div class="popup _fixed " id="thanks">
    <div class="popup-content">
        <div class="popup-top">
            <h4>Спасибо</h4>
            <button class="popup-close">
                <svg width="38" height="38" viewBox="0 0 38 38">
                    <use xlink:href='img/svg/icons.svg#close' />
                </svg>
            </button>
        </div>
        <div class="popup-text">Ваша заявка принята</div>
    </div>
</div>

<div class="popup _fixed" id="error">
    <div class="popup-content">
        <div class="popup-top">
            <h4>Ошибка!</h4>
            <button class="popup-close">
                <svg width="38" height="38" viewBox="0 0 38 38">
                    <use xlink:href='img/svg/icons.svg#close' />
                </svg>
            </button>
        </div>
        <div class="popup-text">Пожалуйста повоторите попытку позже</div>
    </div>
</div>

<div class="widget">
    <div class="widget-body">
        <a href="" target="_blank">
            <svg width="16" height="16" viewBox="0 0 16 16">
                <use xlink:href='img/svg/icons.svg#tg-widget' />
            </svg>
        </a>
        <a href="" target="_blank">
            <svg width="16" height="16" viewBox="0 0 16 16">
                <use xlink:href='img/svg/icons.svg#phone' />
            </svg>
        </a>
    </div>
    <button class="widget-open">
        <svg width="38" height="38" viewBox="0 0 38 38" class="open">
            <use xlink:href='img/svg/icons.svg#chat' />
        </svg>
        <svg width="38" height="38" viewBox="0 0 38 38" class="close">
            <use xlink:href='img/svg/icons.svg#close' />
        </svg>
    </button>
</div>
