<section class="section callback" id="callback">
    <div class="section__container _container">
        <div class="section__body grid grid-2">
            <div class="section__top">
                <span>
                    <div class="dot"></div>Консультация
                </span>
                <h2>Получите <br>
                    консультацию</h2>
            </div>
            <div class="form">
                <div class="form-top">
                    <p>Получите бесплатную консультацию по услугам, их стоимости и срокам. Вы можете написать нам
                        в  Telegramэто ускорит ответ.</p>
                </div>
                <form action="">
                    <div class="form__item" data-required>
                        <input type="text">
                        <span>Имя</span>
                    </div>
                    <div class="form__item" data-required>
                        <input type="text" class="_mask-phone">
                        <span>Телефон</span>
                    </div>
                    <div class="form__item" data-required>
                        <input type="email">
                        <span>Email</span>
                    </div>
                    <div class="form-privacy">Нажимая на кнопку «Отправить»,
                        я даю согласие на обработку персональных данных
                        и соглашаюсь с <a href="/privacy/" target="_blank">политикой конфиденциальности</a></div>
                    <button class="_btn _btn-white">
                        <span>Отправить</span>
                        <svg width="16" height="16" viewBox="0 0 16 16">
                            <use xlink:href='img/svg/icons.svg#arrow-btn' />
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
