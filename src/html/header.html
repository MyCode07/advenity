<header class="header _fixed">
    <div class="header__container _container">
        <div class="header__body">
            <div class="header__left">
                <a href="/" class="header__logo header__item">
                    <img src="@img/logo.svg" alt="">
                </a>
                <div class="lang header__item">
                    <li class="lang-item lang-item-15 lang-item-en lang-item-first">
                        <a lang="en-US" hreflang="en-US" href="https://zambulay.com/en/">En</a>
                    </li>
                    <li class="lang-item lang-item-18 lang-item-ru current-lang">
                        <a lang="ru-RU" hreflang="ru-RU" href="https://zambulay.com/" aria-current="true">Ру</a>
                    </li>
                    <svg width="9" height="6" viewBox="0 0 9 6">
                        <use xlink:href='img/svg/icons.svg#arrow-down' />
                    </svg>
                </div>
                <button class="header__burger header__item" data-text-show="Меню" data-text-hide="Закрыть">
                    Меню
                </button>
            </div>
            <div class="header__center">
                <nav class="header__item">
                    <ul>
                        <li><a href="">Главная</a></li>
                        <li><a href="">О нас</a></li>
                        <li><a href="">Услуги</a></li>
                        <li><a href="">Проекты</a></li>
                        <li><a href="">Отзывы</a></li>
                        <li><a href="">Контакты</a></li>
                    </ul>
                </nav>
            </div>
            <div class="header__right">
                <a href="" class="soc-item header__item">
                    <svg width="16" height="16" viewBox="0 0 16 16">
                        <use xlink:href='img/svg/icons.svg#tg' />
                    </svg>
                </a>
                <a href="" class="soc-item header__item">
                    <svg width="16" height="16" viewBox="0 0 16 16">
                        <use xlink:href='img/svg/icons.svg#vk' />
                    </svg>
                </a>
                <button class="header__btn header__item" data-open-popup="callback">
                    Консультация
                </button>
            </div>
        </div>
    </div>
</header>
